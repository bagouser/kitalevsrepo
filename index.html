<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>My Cydia Repo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg: #f2f2f7;
    --card: #ffffff;
    --text: #000000;
    --secondary: #8e8e93;
    --accent: #007aff;
}

body.dark {
    --bg: #000000;
    --card: #1c1c1e;
    --text: #ffffff;
    --secondary: #8e8e93;
    --accent: #0a84ff;
}

* {
    box-sizing: border-box;
    transition: background-color .3s, color .3s;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* ===== Theme Toggle ===== */
.theme-toggle {
    position: fixed;
    top: 14px;
    right: 14px;
    width: 44px;
    height: 44px;
    background: var(--card);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,.25);
    z-index: 10;
}

/* ===== Layout ===== */
.container {
    max-width: 420px;
    margin: 80px auto 40px;
    padding: 0 16px;
    animation: slideUp .6s ease;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(25px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.header {
    text-align: center;
    margin-bottom: 20px;
}

.header h1 {
    margin: 0;
    font-size: 28px;
    font-weight: 700;
}

.header p {
    margin-top: 6px;
    color: var(--secondary);
    font-size: 15px;
}

/* ===== Card ===== */
.card {
    background: var(--card);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 12px 35px rgba(0,0,0,.25);
}

.repo-url {
    background: rgba(120,120,128,.12);
    border-radius: 14px;
    padding: 12px;
    font-size: 14px;
    text-align: center;
    word-break: break-all;
    margin-bottom: 18px;
}

/* ===== Button ===== */
.button {
    display: block;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    text-align: center;
    padding: 14px;
    border-radius: 14px;
    font-weight: 600;
    font-size: 16px;
}

.button:active {
    transform: scale(.97);
}

/* ===== Footer ===== */
footer {
    text-align: center;
    margin-top: 18px;
    font-size: 13px;
    color: var(--secondary);
}
</style>
</head>

<body>

<div class="theme-toggle" onclick="toggleTheme()">🌓</div>

<div class="container">
    <div class="header">
        <h1>My Cydia Repo</h1>
        <p>Твики и дополнения для iOS</p>
    </div>

    <div class="card">
        <div class="repo-url">
            https://username.github.io/cydia-repo/
        </div>

        <a class="button"
           href="cydia://url/https://cydia.saurik.com/api/share#?source=https://username.github.io/cydia-repo/">
            Добавить в Cydia
        </a>
    </div>

    <footer>
        © 2026 My Repo
    </footer>
</div>

<script>
const body = document.body;
const savedTheme = localStorage.getItem("theme");

if (savedTheme === "dark") {
    body.classList.add("dark");
}

function toggleTheme() {
    body.classList.toggle("dark");
    localStorage.setItem(
        "theme",
        body.classList.contains("dark") ? "dark" : "light"
    );
}
</script>

</body>
</html>
