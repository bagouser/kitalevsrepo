<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>My Cydia Repo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg: #f5f6fa;
            --card: #ffffff;
            --text: #2f3640;
            --accent: #4cd137;
        }

        body.dark {
            --bg: #0f1220;
            --card: #1b1f3b;
            --text: #f5f6fa;
            --accent: #00a8ff;
        }

        * {
            box-sizing: border-box;
            transition: background-color 0.4s, color 0.4s;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            background: var(--card);
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        h1 {
            margin-top: 0;
            text-align: center;
            font-size: 26px;
        }

        p {
            text-align: center;
            opacity: 0.8;
        }

        .repo-url {
            background: rgba(0,0,0,0.05);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            word-break: break-all;
            margin: 20px 0;
            font-weight: 500;
        }

        body.dark .repo-url {
            background: rgba(255,255,255,0.08);
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        a.button {
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            transform: scale(1);
        }

        a.button:hover {
            transform: scale(1.05);
        }

        .theme-toggle {
            margin-top: 20px;
            text-align: center;
            cursor: pointer;
            opacity: 0.8;
            font-size: 14px;
        }

        .theme-toggle:hover {
            opacity: 1;
        }

        footer {
            margin-top: 18px;
            text-align: center;
            font-size: 13px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>🚀 My Cydia Repo</h1>
        <p>Репозиторий твиков для iOS</p>

        <div class="repo-url">
            https://username.github.io/cydia-repo/
        </div>

        <div class="buttons">
            <a class="button" href="cydia://url/https://cydia.saurik.com/api/share#?source=https://username.github.io/cydia-repo/">
                Добавить в Cydia
            </a>
            <a class="button" href="https://github.com/username/cydia-repo">
                GitHub
            </a>
        </div>

        <div class="theme-toggle" onclick="toggleTheme()">
            🌙 / ☀️ Переключить тему
        </div>
    </div>

    <footer>
        © 2026 My Repo
    </footer>
</div>

<script>
    const body = document.body;
    const savedTheme = localStorage.getItem('theme');

    if (savedTheme === 'dark') {
        body.classList.add('dark');
    }

    function toggleTheme() {
        body.classList.toggle('dark');
        localStorage.setItem('theme', body.classList.contains('dark') ? 'dark' : 'light');
    }
</script>

</body>
</html>
