<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>My Cydia Repo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg: #f2f2f7;
    --card: #ffffff;
    --text: #000000;
    --secondary: #8e8e93;
    --accent: #007aff;
}
body.dark {
    --bg: #000000;
    --card: #1c1c1e;
    --text: #ffffff;
    --secondary: #8e8e93;
    --accent: #0a84ff;
}
* { box-sizing: border-box; transition: background-color .3s, color .3s; }
body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; background: var(--bg); color: var(--text); }

/* ===== Theme Toggle ===== */
.theme-toggle {
    position: fixed; top:14px; right:14px; width:44px; height:44px; background: var(--card); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,.25); z-index:10;
}

/* ===== Layout ===== */
.container { max-width: 420px; margin: 80px auto 40px; padding:0 16px; }
.header { text-align:center; margin-bottom:20px; }
.header h1 { margin:0; font-size:28px; font-weight:700; }
.header p { margin-top:6px; color: var(--secondary); font-size:15px; }

/* ===== Repo card ===== */
.card { background: var(--card); border-radius:20px; padding:20px; box-shadow:0 12px 35px rgba(0,0,0,.25); margin-bottom:16px; transition: transform .2s; }
.card:hover { transform: translateY(-3px); }
.card h2 { margin:0 0 6px; font-size:18px; }
.card p { margin:4px 0; color: var(--secondary); font-size:14px; }
.card a { display:inline-block; margin-top:8px; text-decoration:none; color: var(--accent); font-weight:600; }

/* ===== Footer ===== */
footer { text-align:center; margin-top:18px; font-size:13px; color: var(--secondary); }

.loader { text-align:center; margin-top:40px; color: var(--secondary); }
</style>
</head>

<body>

<div class="theme-toggle" onclick="toggleTheme()">🌓</div>

<div class="container">
    <div class="header">
        <h1>My Cydia Repo</h1>
        <p>Твики и дополнения для iOS</p>
    </div>

    <div id="repo-url" class="card">
        <p>Repo URL:</p>
        <p><strong>https://username.github.io/cydia-repo/</strong></p>
        <a href="cydia://url/https://cydia.saurik.com/api/share#?source=https://username.github.io/cydia-repo/" class="button">Добавить в Cydia</a>
    </div>

    <div id="tweaks-list">
        <div class="loader">Загрузка твиков...</div>
    </div>

    <footer>© 2026 My Repo</footer>
</div>

<script>
const body = document.body;
const savedTheme = localStorage.getItem("theme");
if(savedTheme === "dark"){ body.classList.add("dark"); }
function toggleTheme(){
    body.classList.toggle("dark");
    localStorage.setItem("theme", body.classList.contains("dark") ? "dark" : "light");
}

// ===== Парсинг Packages =====
async function loadTweaks() {
    try {
        const response = await fetch('Packages'); // убедись, что файл Packages есть в корне репо
        const text = await response.text();
        const tweaks = parsePackages(text);
        displayTweaks(tweaks);
    } catch(err) {
        document.getElementById('tweaks-list').innerHTML = '<p class="loader">Не удалось загрузить твики.</p>';
        console.error(err);
    }
}

// ===== Функция парсинга =====
function parsePackages(data) {
    const blocks = data.split(/\n\n+/);
    return blocks.map(block => {
        const lines = block.split("\n");
        const obj = {};
        lines.forEach(line => {
            const idx = line.indexOf(':');
            if(idx > 0){
                const key = line.slice(0, idx).trim();
                const value = line.slice(idx+1).trim();
                obj[key] = value;
            }
        });
        return obj;
    }).filter(pkg => pkg.Package); // только реальные пакеты
}

// ===== Вывод твиков =====
function displayTweaks(tweaks) {
    const container = document.getElementById('tweaks-list');
    container.innerHTML = '';
    tweaks.forEach(tweak => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            <h2>${tweak.Package}</h2>
            <p>${tweak.Description || ''}</p>
            <p>Версия: ${tweak.Version || 'N/A'}</p>
            <a href="cydia://package/${tweak.Package}">Установить</a>
        `;
        container.appendChild(div);
    });
}

loadTweaks();
</script>

</body>
</html>
